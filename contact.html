<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/contact.css">
    <script src="assets/js/theme.js"></script>
</head>
<body>
    <!-- Global Navbar -->
    <div class="navbar-wrapper" id="main-nav" style="position: relative; top: 0; padding-top: 20px; padding-bottom: 20px;">
        <nav class="navbar" style="background: var(--primary-color);">
            <a href="index.html" class="nav-brand">MADE BY IRVINE</a>
            <div class="nav-links">
                <div class="nav-item dropdown">
                    <span class="nav-label">Categories</span>
                    <div class="dropdown-content">
                        <a href="index.html#categories">Home</a>
                        <a href="lens.html">Lens of Irvine</a>
                        <a href="apps.html">App Development</a>
                        <a href="digital-arts.html">Digital Arts</a>
                    </div>
                </div>
                <div class="nav-item"><span class="nav-label">Button 2</span></div>
                <div class="nav-item"><span class="nav-label">Button 3</span></div>
                <a href="contact.html" class="nav-item"><span class="nav-label">Contact Me</span></a>
            </div>
        </nav>
        <label class="theme-switch" for="theme-toggle" title="Toggle Theme">
            <input type="checkbox" id="theme-toggle">
            <div class="slider round">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            </div>
        </label>
    </div>

    <main class="contact-container">
        <div class="contact-card">
            <h1 class="page-title">Get in Touch</h1>
            <p class="contact-subtitle">Have a project in mind or just want to say hi? Send me a message!</p>
            
            <form class="contact-form" action="#" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="John Doe" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Your message here..." required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Send Message</button>
            </form>
        </div>
    </main>
</body>
</html>
